name: Build and deploy Backend to Azure Container App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name group1m

      - name: Build and push Backend image
        run: |
          docker build --platform linux/amd64 \
            -t group1m.azurecr.io/backend-appp:latest \
            ./ecommerce-app-backend
          docker push group1m.azurecr.io/backend-appp:latest

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name backend-appp \
            --resource-group rg-ecommerce-3tier-group1 \
            --image group1m.azurecr.io/backend-appp:latest